name: Build and Push Community Service
on:
  push:
    branches: [ "feature/**", "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Opsaet dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore Community/Community.csproj
      - name: Saet version
        id: version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Byg
        run: dotnet build Community/Community.csproj --no-restore /p:Version=${{ steps.version.outputs.VERSION }}
  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Saet version
        id: version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Community
          file: ./Community/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            frederikrai/community-service:latest
            frederikrai/community-service:${{ steps.version.outputs.VERSION }}
